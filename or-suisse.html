<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🇨🇭 Or Suisse</title>  <link rel="stylesheet" href="style.css">
  <script src="data.js"></script>
</head><body>  <!-- HEADER -->  <div class="header">
    <div class="header-left">
      <h2>🇨🇭 Or Suisse</h2>
      <small>Stock sécurisé</small>
    </div><div class="header-right">
  <a href="index.html" class="badge">← Retour</a>
</div>

  </div>  <div class="container"><!-- TOTAL -->
<div class="highlight">
  <small>Total Or Suisse</small>
  <h2 id="totalSwiss">0 g</h2>
</div>

<!-- KPI -->
<div class="kpi-grid">
  <div class="kpi">
    <small>Type</small>
    <h3>Or</h3>
  </div>

  <div class="kpi">
    <small>Poids</small>
    <h3 id="kpiWeight">0 g</h3>
  </div>
</div>

<!-- TABLE -->
<div class="card">
  <h3>Métaux Suisse</h3>

  <table>
    <thead>
      <tr>
        <th>Type</th>
        <th>Stockage</th>
        <th>Qté</th>
      </tr>
    </thead>
    <tbody id="tableSwiss"></tbody>
  </table>

  <div class="total-line">
    <span>Total</span>
    <span id="tableTotal">0 g</span>
  </div>
</div>

  </div>  <script>
    // DATA
    const weight = DATA.gold.suisse;

    // INJECTION
    const formatted = weight.toFixed(2) + " g";

    document.getElementById("totalSwiss").textContent = formatted;
    document.getElementById("kpiWeight").textContent = formatted;
    document.getElementById("tableTotal").textContent = formatted;

    document.getElementById("tableSwiss").innerHTML = `
      <tr>
        <td>Or</td>
        <td>Suisse</td>
        <td>${formatted}</td>
      </tr>
    `;
  </script></body>
</html>
