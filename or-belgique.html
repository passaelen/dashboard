<!DOCTYPE html>
<html lang="fr">

<div class="container">

</table>
      
<br>
    
<table>

    <span id="tableTotalBelgique">0 g</span>
  </div>

</div>

</div>



</table>
</tbody>

<script>
  // 🔥 connexion DATA propre
  const weight = DATA?.portfolio?.or_belgique_g || 0;

  const formatted = weight.toFixed(2) + " g";

   document.getElementById("tableTotalBelgique").textContent = formatted;

</script>
