<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boussole</title>

<link rel="stylesheet" href="style.css">

<style>

body {
    background: #020617;
    color: #e2e8f0;
    font-family: system-ui;
    text-align: center;
    padding: 20px;
}

.boussole-container {
    position: relative;
    max-width: 340px;
    margin: 40px auto;
}

.boussole-img {
    width: 100%;
    border-radius: 16px;
}

/* AIGUILLE */
.needle {
    position: absolute;
    top: 50%;
    left: 50%;

    width: 3px;
    height: 42%;

    background: linear-gradient(to top, #f59e0b, #facc15);

    transform-origin: bottom center;
    transform: translate(-50%, -100%) rotate(0deg);

    border-radius: 2px;

    box-shadow: 0 0 8px rgba(250,204,21,0.5);
}

/* centre */
.needle::after {
    content: "";
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);

    width: 10px;
    height: 10px;

    background: #facc15;
    border-radius: 50%;

    box-shadow: 0 0 10px rgba(250,204,21,0.8);
}

.zone {
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.8;
}

.value {
    font-size: 22px;
    font-weight: 600;
    margin-top: 6px;
}

</style>
</head>

<body>

<h2>🧭 Boussole du cycle</h2>

<div class="boussole-container">

    <img src="boussole.jpg" class="boussole-img">

    <div class="needle" id="needle"></div>

</div>

<div class="zone" id="zone-text"></div>
<div class="value" id="ratio-text"></div>

<script>

</script>
</body>
</html>
