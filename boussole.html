<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boussole</title>

<link rel="stylesheet" href="style.css">

<style>

body {
    background: #020617;
    color: #e2e8f0;
    font-family: system-ui;
    text-align: center;
    padding: 20px;
}

.boussole-container {
    position: relative;
    max-width: 340px;
    margin: 40px auto;
}

.boussole-img {
    width: 100%;
    border-radius: 16px;
}

/* AIGUILLE */
.needle {
    position: absolute;
    top: 50%;
    left: 50%;

    width: 3px;
    height: 42%;

    background: linear-gradient(to top, #f59e0b, #facc15);

    transform-origin: bottom center;
    transform: translate(-50%, -100%) rotate(0deg);

    border-radius: 2px;

    box-shadow: 0 0 8px rgba(250,204,21,0.5);
}

/* centre */
.needle::after {
    content: "";
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);

    width: 10px;
    height: 10px;

    background: #facc15;
    border-radius: 50%;

    box-shadow: 0 0 10px rgba(250,204,21,0.8);
}

.zone {
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.8;
}

.value {
    font-size: 22px;
    font-weight: 600;
    margin-top: 6px;
}

</style>
</head>

<body>

<h2>🧭 Boussole du cycle</h2>

<div class="boussole-container">

    <img src="bous.png" class="boussole-img" alt="Boussole">

    <div class="needle" id="needle"></div>

</div>

<div class="boussole-zone" id="zone-text"></div>
<div class="boussole-value" id="ratio-text"></div>

<script>

// ===== PARAM =====
const params = new URLSearchParams(window.location.search);
const ratio = parseFloat(params.get("ratio")) || 50;


// ===== ZONE =====
function getZone(r){
    if(r >= 70) return "❄️ Hibernation";
    if(r >= 50) return "🧊 Zone Nord";
    if(r >= 47) return "🌤️ Transition";
    if(r >= 45) return "☀️ Chaud";
    if(r >= 40) return "🔥 Très chaud";
    return "🚨 Extrême";
}


// ===== ANGLE ADAPTÉ À TON IMAGE =====
// ici on utilise un angle vertical
function getAngle(r){

    const min = 30;
    const max = 120;

    const clamped = Math.max(min, Math.min(max, r));

    // mapping vers -90° (haut) à +90° (bas)
    return ((clamped - min) / (max - min)) * 180 - 90;
}


// ===== ANIMATION =====
const needle = document.getElementById("needle");
const angle = getAngle(ratio);

setTimeout(() => {
    needle.style.transition = "transform 1.2s cubic-bezier(0.22,1,0.36,1)";
    needle.style.transform = `translateX(-50%) rotate(${angle - 100}deg)`;
}, 100);


// ===== TEXTE =====
document.getElementById("zone-text").innerText = getZone(ratio);

document.getElementById("ratio-text").innerText =
    ratio.toFixed(2).replace(".", ",");

    
</script>
</body>
</html>
