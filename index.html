<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portefeuille</title>

    <link rel="stylesheet" href="style.css?v=59">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">

    <link rel="apple-touch-icon" href="icon-192-v2.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>

<div class="container">

<div class="header">
    <div class="header-left">
        <h2>💼 Portefeuille</h2>
        <small>Or · Argent · ETF</small>
    </div>

    <div class="header-actions">
        <div id="refresh-btn" class="refresh">⟳</div>
        <div id="variation" class="badge-perf"></div>
    </div>
</div>

<div class="card highlight">
    <small>Total global</small>
    <h2 id="total" class="gold"></h2>
</div>

<div class="kpi-grid">
    <div class="kpi"><small>OR</small><h3 id="or"></h3></div>
    <div class="kpi"><small>ARGENT</small><h3 id="argent"></h3></div>
    <div class="kpi"><small>RATIO</small><h3 id="ratio"></h3></div>
</div>

<div class="card alert-box">
    <span id="alert-text"></span>
</div>

<div class="card">
    <h3>Évolution 10 jours</h3>
    <canvas id="chart-10j"></canvas>
</div>

</div>

<script>

const OZ_TO_G = 31.1035;

const state = {
    prices: null,
    portfolio: {
        or_suisse_g: 338.66,
        or_belgique_g: 130.62,
        argent_g: 6000
    }
};

function setText(id, value){
    const el = document.getElementById(id);
    if(el) el.innerText = value;
}

function euro(v){
    return v.toLocaleString('fr-BE', {maximumFractionDigits:0}) + " €";
}

async function fetchPrices(){
    const [gold, silver, fx] = await Promise.all([
        fetch("https://api.gold-api.com/price/XAU").then(r=>r.json()),
        fetch("https://api.gold-api.com/price/XAG").then(r=>r.json()),
        fetch("https://open.er-api.com/v6/latest/USD").then(r=>r.json())
    ]);

    const rate = fx.rates.EUR;

    return {
        gold_per_g: (gold.price * rate) / OZ_TO_G,
        silver_per_g: (silver.price * rate) / OZ_TO_G,
    };
}

function calculate(){

    const p = state.prices;
    const pf = state.portfolio;

    const goldTotal =
        (pf.or_suisse_g + pf.or_belgique_g) * p.gold_per_g;

    const silverTotal =
        pf.argent_g * p.silver_per_g;

    const ratio = p.gold_per_g / p.silver_per_g;

    const total = goldTotal + silverTotal;

    return {
        goldTotal,
        silverTotal,
        total,
        ratio
    };
}

function render(data){

    setText("total", euro(data.total));
    setText("or", euro(data.goldTotal));
    setText("argent", euro(data.silverTotal));
    setText("ratio", data.ratio.toFixed(2).replace('.',','));
}

async function init(){

    state.prices = await fetchPrices();

    const result = calculate();
    render(result);
}

window.addEventListener("DOMContentLoaded", () => {

    const refreshBtn = document.getElementById("refresh-btn");

    if (refreshBtn) {
        refreshBtn.addEventListener("click", init);
    }

    init();
});

</script>

</body>
</html>
