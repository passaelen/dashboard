<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portefeuille</title>

<link rel="stylesheet" href="style.css?v=27">


</head>

<body>

<div class="container">

    <!-- ================= HEADER ================= -->
    <div class="header">
        <div>
            <h2 style="margin:0;">💼 Portefeuille</h2>
            <small>Or · Argent · ETF</small>
        </div>
        <div class="badge" id="variation">-274,32 €</div>
    </div>

    <!-- ================= TOTAL ================= -->
    <div class="card highlight">
        <small>Total global</small>
        <h2 id="total" class="gold" style="margin:5px 0;">75 441 €</h2>
    </div>

    <!-- ================= KPI ================= -->
<div class="kpi-grid">
  <div class="kpi">
    <small>OR</small>
    <h3 id="or" class="gold">61 114 €</h3>
   </div>

        <div class="kpi">
            <small>ARGENT</small>
            <h3 id="argent">12 360 €</h3>
        </div>

<div class="kpi">
<small id="ratio-label">
RATIO
</small>
<h3 id="ratio" class="gold"></h3>
</div>

</div>

    <!-- ================= PROGRESS ================= -->
    <div class="progress">
        <div class="progress-bar"></div>
    </div>

    <div class="progress-text">
        <span id="progress-label"></span>
    </div>

<div class="card alert-box" id="alert-box">
<span id="alert-text">Chargement...</span>
</div>



<div class="card">
    <h3>Répartitions</h3>

    <div class="repartition-grid">

        <!-- METAUX -->
        <div class="bloc">
            <h4>Métaux</h4>
            <div class="donut" id="donut-metaux"></div>
            <div class="legend">
                <div><span class="dot or1"></span> Or Suisse <span id="p-or-suisse"></span></div>
                <div><span class="dot or2"></span> Or Belgique <span id="p-or-belgique"></span></div>
                <div><span class="dot argent"></span> Argent <span id="p-argent"></span></div>
            </div>
        </div>

        <!-- ETF -->
        <div class="bloc">
            <h4>ETF</h4>
            <div class="donut etf"></div>
            <div class="legend">
                <div><span class="dot monde"></span> Monde <span id="p-monde"></span></div>
                <div><span class="dot seniors"></span> Séniors <span id="p-seniors"></span></div>
            </div>
        </div>

    </div>
</div>

<!-- GRAPH -->
<div class="card">
    <h3>Évolution 10 jours</h3>
    <div class="chart-container">
        <canvas id="chart-10j"></canvas>
    </div>
</div>



    
    <!-- ================= TABLE ETF ================= -->
    <div class="card">
       <div class="section-header">
          <h3>ETF</h3>
          <div class="section-total">
            <div id="etf-total-value"></div>
            <div id="etf-total-perf"></div>
          </div>
        </div>

        <table class="table">
            <tr>
                <th>ETF</th>
                <th>Parts</th>
                <th>Spot</th>
                <th>Perf</th>
            </tr>
            <tr>
                <td>Monde</td>
                <td id="etf-monde-parts"></td>
                <td id="etf-monde-prix"></td>
                <td id="etf-monde-perf"></td>
            </tr>

            <tr>
                <td>Séniors</td>
                <td id="etf-seniors-parts"></td>
                <td id="etf-seniors-prix"></td>
                <td id="etf-seniors-perf"></td>
            </tr>

            <tr>
                <td>Juniors</td>
                <td id="etf-juniors-parts"></td>
                <td id="etf-juniors-prix"></td>
                <td id="etf-juniors-perf"></td>
            </tr>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<script>

function csvToObject(text) {
    const rows = text.trim().split("\n");
    const data = {};

    for (let row of rows) {
        const cols = row.split(/[,;]+/);
        const key = cols[0]?.trim();
        const value = cols[1]?.trim();
        if (key) data[key] = value;
    }

    return data;
}

function cleanNumber(value) {
    if (!value) return 0;

    return Number(
        value
            .replace(/[^0-9,-]/g, '')
            .replace(',', '.')
    ) || 0;
}

function formatPercent(value) {
    return value.toFixed(2).replace('.', ',') + "%";
}

async function loadData() {
    try {

        const res = await fetch("https://docs.google.com/spreadsheets/d/1-99frehfDPqn9YNLXivivS_axMXi82AGFNO6uIq9Nbw/export?format=csv&gid=1154137383");
        const data = csvToObject(await res.text());

        // ===== VALEURS =====
        const orSuisse = cleanNumber(data["or_suisse_valeur"]);
        const orBelgique = cleanNumber(data["or_belgique_valeur"]);
        const argent = cleanNumber(data["argent_valeur"]);
        const ratioValue = cleanNumber(data["ratio"]);
        const totalGlobal = cleanNumber(data["total_global"]);
        const variation = cleanNumber(data["variation"]);
        const etfTotal = cleanNumber(data["etf_total_valeur"]);

        // ===== KPI =====
        document.getElementById("or").innerText =
            (orSuisse + orBelgique).toLocaleString('fr-BE') + " €";

        document.getElementById("argent").innerText =
            argent.toLocaleString('fr-BE') + " €";

        document.getElementById("total").innerText =
            totalGlobal.toLocaleString('fr-BE') + " €";

        document.getElementById("etf-total-value").innerText =
            etfTotal.toLocaleString('fr-BE') + " €";

        // ===== RATIO =====
        document.getElementById("ratio").innerText=ratioValue.toFixed(2).replace('.', ',');


// ===== ALERT =====
let message = "";

if (ratioValue >= 70) message = "❄️ Zone froide";
else if (ratioValue >= 55) message = "🧊 Nord";
else if (ratioValue >= 50) message = "⚖️ Zone pivot";
else if (ratioValue >= 45) message = "🌤️ Arbitrage";
else if (ratioValue >= 40) message = "🔥 Zone chaude";
else message = "🚨 Zone extrême";

document.getElementById("alert-text").innerText = message;





        // ===== VARIATION =====
        const el = document.getElementById("variation");
        el.innerText =
            (variation >= 0 ? "+" : "") +
            variation.toLocaleString('fr-BE') + " €";
        el.style.color = variation >= 0 ? "#22c55e" : "#ef4444";

        // ===== METAUX =====
        const pOrSuisse = cleanNumber(data["p_or_suisse"]);
        const pOrBelgique = cleanNumber(data["p_or_belgique"]);
        const pArgent = cleanNumber(data["p_argent"]);

        document.getElementById("p-or-suisse").innerText = formatPercent(pOrSuisse);
        document.getElementById("p-or-belgique").innerText = formatPercent(pOrBelgique);
        document.getElementById("p-argent").innerText = formatPercent(pArgent);

        const donut = document.getElementById("donut-metaux");
        if (donut) {
            donut.style.background = `conic-gradient(
                #facc15 0% ${pOrSuisse}%,
                #f59e0b ${pOrSuisse}% ${pOrSuisse + pOrBelgique}%,
                #9ca3af ${pOrSuisse + pOrBelgique}% 100%
            )`;
        }

        // ===== ETF =====
        const etfMonde = cleanNumber(data["etf_monde_valeur"]);
        const etfSeniors = cleanNumber(data["etf_seniors_valeur"]);

        const totalETF = etfMonde + etfSeniors;

        if (totalETF > 0) {
            const pMonde = (etfMonde / totalETF) * 100;
            const pSeniors = (etfSeniors / totalETF) * 100;

            document.getElementById("p-monde").innerText = formatPercent(pMonde);
            document.getElementById("p-seniors").innerText = formatPercent(pSeniors);

            const donutETF = document.querySelector(".donut.etf");

            if (donutETF) {
                donutETF.style.background = `conic-gradient(
                    #38bdf8 0% ${pMonde}%,
                    #22c55e ${pMonde}% 100%
                )`;
            }
        }




// ===== GRAPH 10 JOURS =====
const resChart = await fetch("https://docs.google.com/spreadsheets/d/1-99frehfDPqn9YNLXivivS_axMXi82AGFNO6uIq9Nbw/export?format=csv&gid=1311770820");
const rowsChart = (await resChart.text()).trim().split("\n");

const labels = [];
const values = [];

for (let i = 1; i < rowsChart.length; i++) {
    const cols = rowsChart[i].split(",");
    const value = cleanNumber(cols[7]);

    if (value > 1000) {
        labels.push(cols[0]);
        values.push(value);
    }
}

const lastLabels = labels.slice(-10);
const lastValues = values.slice(-10);

const ctx = document.getElementById("chart-10j");

if (ctx) {
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: lastLabels,
            datasets: [{
                data: lastValues,
                tension: 0.4,
                fill: true,
                borderWidth: 2,
                borderColor: "#facc15",
                backgroundColor: "rgba(250, 204, 21, 0.1)",
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { ticks: { color: '#9ca3af' } },
                y: { ticks: { color: '#9ca3af' } }
            }
        }
    });
}






    } catch (e) {
        console.error("Erreur :", e);
    }
}

loadData();

</script>


</body>
</html>
