<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portefeuille</title>

<link rel="stylesheet" href="style.css?v=100">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
    <h2>💼 Portefeuille</h2>
    <div id="variation" class="badge-perf"></div>
</div>

<!-- TOTAL -->
<div class="card highlight">
    <small>Total global</small>
    <h2 id="total"></h2>
</div>

<!-- KPI -->
<div class="kpi-grid">
    <div class="kpi"><small>OR</small><h3 id="or"></h3></div>
    <div class="kpi"><small>ARGENT</small><h3 id="argent"></h3></div>
    <div class="kpi"><small>RATIO</small><h3 id="ratio"></h3></div>
</div>

<!-- ALERT -->
<div class="card alert-box">
    <span id="alert-text"></span>
</div>

<!-- DONUTS -->
<div class="card">
<h3>Répartitions</h3>

<div class="repartition-grid">

<div class="bloc">
<h4>Métaux</h4>
<div class="donut" id="donut-metaux"></div>
<div id="legend-metaux"></div>
</div>

<div class="bloc">
<h4>ETF</h4>
<div class="donut" id="donut-etf"></div>
<div id="legend-etf"></div>
</div>

</div>
</div>

<!-- GRAPH -->
<div class="card">
<h3>Évolution 10 jours</h3>
<canvas id="chart-10j"></canvas>
</div>

<!-- BLOCS BAS -->
<div class="card">
    <h3>💎 Métaux</h3>
    <div id="metaux-total-bottom"></div>
</div>

<div class="card">
    <h3>📊 ETF</h3>
    <div id="etf-total-bottom"></div>
</div>

</div>

<script>

// ===== UTILS =====
function cleanNumber(v){
    if(!v) return 0;
    return Number(v.replace(/\s/g,'').replace('€','').replace(',','.')) || 0;
}

function formatEuro(v){
    return v.toLocaleString('fr-BE') + " €";
}

// ===== PARSE CSV STABLE =====
function parseCSV(text){

    const lines = text.split("\n");
    const temp = {};
    const data = {};

    for(let line of lines){

        if(!line.trim()) continue;

        const cols = line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
        if(!cols || cols.length < 2) continue;

        const key = cols[0].replace(/"/g,"").trim();
        const value = cols[1].replace(/"/g,"").trim();

        // ignore dates
        if(/\d{2}\/\d{2}\/\d{4}/.test(key)) continue;

        if(!temp[key]) temp[key] = [];
        temp[key].push(value);
    }

    for(let k in temp){
        data[k] = temp[k][temp[k].length-1];
    }

    return data;
}

// ===== LOAD DATA =====
async function loadData(){

const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQQqy9DRNPqKY59Ka56rNkWGwYfd7XqKiGh6YJxudczufOx7ZOW6SzlTObz4DLG4t6AK9qmBfn6Tl78/pub?gid=1154137383&single=true&output=csv&_="+Date.now());
const raw = await res.text();
const data = parseCSV(raw);

// ===== VALUES =====
const orS = cleanNumber(data["or_suisse_valeur"]);
const orB = cleanNumber(data["or_belgique_valeur"]);
const argent = cleanNumber(data["argent_valeur"]);
const ratio = cleanNumber(data["ratio"]);

const etfMonde = cleanNumber(data["etf_monde_valeur"]);
const etfSeniors = cleanNumber(data["etf_seniors_valeur"]);

const totalETF = etfMonde + etfSeniors;
const total = orS + orB + argent + totalETF;

// ===== DISPLAY =====
document.getElementById("total").innerText = formatEuro(total);
document.getElementById("or").innerText = formatEuro(orS+orB);
document.getElementById("argent").innerText = formatEuro(argent);
document.getElementById("ratio").innerText = ratio.toFixed(2).replace('.',',');

// ===== ALERT =====
document.getElementById("alert-text").innerHTML =
ratio>=60 ? "🌨️ Nord tempéré — Vigilance<br>Conserver"
: ratio>=50 ? "⚖️ Pivot"
: ratio>=45 ? "🌤️ Arbitrage"
: "🔥 Action";

// ===== DONUT METAUX =====
const totalMetaux = orS+orB+argent;

const pOrS = (orS/totalMetaux)*100;
const pOrB = (orB/totalMetaux)*100;
const pAg = (argent/totalMetaux)*100;

document.getElementById("donut-metaux").style.background =
`conic-gradient(#facc15 0% ${pOrS}%, #f59e0b ${pOrS}% ${pOrS+pOrB}%, #9ca3af ${pOrS+pOrB}% 100%)`;

document.getElementById("legend-metaux").innerHTML =
`Or Suisse ${pOrS.toFixed(1)}%<br>
 Or Belgique ${pOrB.toFixed(1)}%<br>
 Argent ${pAg.toFixed(1)}%`;

// ===== DONUT ETF =====
if(totalETF>0){
    const pM = (etfMonde/totalETF)*100;
    const pS = (etfSeniors/totalETF)*100;

    document.getElementById("donut-etf").style.background =
    `conic-gradient(#38bdf8 0% ${pM}%, #22c55e ${pM}% 100%)`;

    document.getElementById("legend-etf").innerHTML =
    `Monde ${pM.toFixed(1)}%<br>
     Séniors ${pS.toFixed(1)}%`;
}

// ===== BLOCS BAS =====
document.getElementById("metaux-total-bottom").innerText = formatEuro(totalMetaux);
document.getElementById("etf-total-bottom").innerText = formatEuro(totalETF);

// ===== GRAPH =====
const rows = raw.split("\n");
let values = [];
let labels = [];

for(let r of rows){
    const cols = r.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
    if(!cols) continue;

    const key = cols[0].replace(/"/g,'').trim();
    const val = cleanNumber(cols[1]);

    if(/\d{2}\/\d{2}\/\d{4}/.test(key)){
        labels.push(key);
        values.push(val);
    }
}

// ===== VARIATION FIX =====
let variation = 0;
if(values.length>0){
    variation = total - values[values.length-1];
}

const varEl = document.getElementById("variation");
varEl.innerText = (variation>=0?"+":"") + formatEuro(variation);
varEl.className = variation>=0 ? "badge-perf positive" : "badge-perf negative";

// ===== CHART =====
if(window.chart) window.chart.destroy();

window.chart = new Chart(document.getElementById("chart-10j"),{
    type:'line',
    data:{
        labels: labels.slice(-10),
        datasets:[{
            data: values.slice(-10),
            borderColor:"#facc15",
            borderWidth:3,
            tension:0.4,
            fill:false
        }]
    },
    options:{plugins:{legend:{display:false}}}
});

}

// ===== INIT =====
loadData();
setInterval(loadData,300000);

</script>

</body>
</html>
