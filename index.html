<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portefeuille</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">
    <small>ETF</small>
    <h3 id="etf-total-value">0 €</h3>
</div>

<div class="card">
    <small>Répartition Métaux</small>
    <div id="donut-metaux" style="height:100px; border-radius:50%; margin:10px 0;"></div>
    <div>
        Or Suisse : <span id="p-or-suisse"></span><br>
        Or Belgique : <span id="p-or-belgique"></span><br>
        Argent : <span id="p-argent"></span>
    </div>
</div>


<div class="container">

    <div class="header">
        <h2>💼 Portefeuille</h2>
        <div class="badge" id="variation">...</div>
    </div>

    <div class="card">
        <small>Total</small>
        <h2 id="total">0 €</h2>
    </div>

    <div class="card">
        <small>OR</small>
        <h3 id="or">0 €</h3>
    </div>

    <div class="card">
        <small>ARGENT</small>
        <h3 id="argent">0 €</h3>
    </div>

    <div class="card">
        <small id="ratio-label">RATIO</small>
        <h3 id="ratio">--</h3>
    </div>

    <div class="card alert-box" id="alert-box">
        <span id="alert-text">...</span>
    </div>

</div>









<script>



function csvToObject(text) {
    const rows = text.trim().split("\n");
    const data = {};

    for (let row of rows) {
        const cols = row.split(/[,;]+/);
        const key = cols[0]?.trim();
        const value = cols[1]?.trim();
        if (key) data[key] = value;
    }

    return data;
}

function cleanNumber(value) {
    if (!value) return 0;

    return Number(
        value
            .replace(/[^0-9,-]/g, '')
            .replace(',', '.')
    ) || 0;
}

async function loadData() {
    try {

// ===== FETCH DATA =====
        
const res = await fetch("https://docs.google.com/spreadsheets/d/1-99frehfDPqn9YNLXivivS_axMXi82AGFNO6uIq9Nbw/export?format=csv&gid=1154137383");

const data = csvToObject(await res.text());
const pOrSuisse = cleanNumber(data["p_or_suisse"]);
const pOrBelgique = cleanNumber(data["p_or_belgique"]);
const pArgent = cleanNumber(data["p_argent"]);



console.log("DATA:", data);


document.getElementById("p-or-suisse").innerText = pOrSuisse + "%";
document.getElementById("p-or-belgique").innerText = pOrBelgique + "%";
document.getElementById("p-argent").innerText = pArgent + "%";






const donut = document.getElementById("donut-metaux");

if (donut) {
    donut.style.background = `conic-gradient(
        #facc15 0% ${pOrSuisse}%,
        #f59e0b ${pOrSuisse}% ${pOrSuisse + pOrBelgique}%,
        #9ca3af ${pOrSuisse + pOrBelgique}% 100%
    )`;
}




        // ===== VALEURS =====
        const orSuisse = cleanNumber(data["or_suisse_valeur"]);
        const orBelgique = cleanNumber(data["or_belgique_valeur"]);
        const argent = cleanNumber(data["argent_valeur"]);
        const ratioValue = cleanNumber(data["ratio"]);
        const variation = cleanNumber(data["variation"]);
        const totalGlobal = cleanNumber(data["total_global"]);


// ===== KPI =====
        document.getElementById("or").innerText =
            (orSuisse + orBelgique).toLocaleString('fr-BE') + " €";

        document.getElementById("argent").innerText =
            argent.toLocaleString('fr-BE') + " €";

        document.getElementById("total").innerText =
            totalGlobal.toLocaleString('fr-BE') + " €";

       
const etfMonde = cleanNumber(data["etf_monde_valeur"]);
const etfSeniors = cleanNumber(data["etf_seniors_valeur"]);
const etfTotal = cleanNumber(data["etf_total_valeur"]);

document.getElementById("etf-total-value").innerText =
    etfTotal.toLocaleString('fr-BE') + " €";


 // ===== RATIO =====
        document.getElementById("ratio").innerText =
            ratioValue.toFixed(2).replace('.', ',');

        let label = "";
        let emoji = "";

        if (ratioValue >= 80) { label = "Nord très profond"; emoji = "🐻‍❄️🐻‍❄️"; }
        else if (ratioValue >= 70) { label = "Nord profond"; emoji = "❄️"; }
        else if (ratioValue >= 55) { label = "Nord"; emoji = "🧊"; }
        else if (ratioValue >= 50) { label = "Pivot"; emoji = "⚖️"; }
        else if (ratioValue >= 45) { label = "Sud tempéré"; emoji = "🌤️"; }
        else if (ratioValue >= 40) { label = "Chaud"; emoji = "🔥"; }
        else { label = "Canicule"; emoji = "🚨"; }

        document.getElementById("ratio-label").innerHTML =
            "RATIO - " + emoji + " " + label;


// ===== ALERT =====
        let message = "";

        if (ratioValue >= 70) message = "❄️ Zone froide";
        else if (ratioValue >= 55) message = "🧊 Nord";
        else if (ratioValue >= 50) message = "⚖️ Pivot";
        else if (ratioValue >= 45) message = "🌤️ Arbitrage";
        else if (ratioValue >= 40) message = "🔥 Chaud";
        else message = "🚨 Extrême";

        document.getElementById("alert-text").innerText = message;



// ===== VARIATION =====
        const el = document.getElementById("variation");

        if (!variation) {
            el.innerText = "—";
        } else {
            el.innerText =
                (variation >= 0 ? "+" : "") +
                variation.toLocaleString('fr-BE') + " €";

            el.style.color = variation >= 0 ? "#22c55e" : "#ef4444";
        }






} catch (e) 
{console.error("Erreur:", e);}
}

loadData();

</script>

</body>
</html>
