<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portefeuille</title>

<link rel="stylesheet" href="style.css?v=60">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
    <div>
        <h2>💼 Portefeuille</h2>
        <small>Or · Argent · ETF</small>
    </div>

    <div>
        <span id="variation" class="badge-perf"></span>
        <button id="refresh-btn">⟳</button>
    </div>
</div>

<!-- TOTAL -->
<div class="card highlight">
    <small>Total global</small>
    <h2 id="total"></h2>
</div>

<!-- KPI -->
<div class="kpi-grid">
    <div class="kpi"><small>OR</small><h3 id="or"></h3></div>
    <div class="kpi"><small>ARGENT</small><h3 id="argent"></h3></div>
    <div class="kpi"><small>RATIO</small><h3 id="ratio"></h3></div>
</div>

<!-- GRAPH -->
<div class="card">
    <h3>Évolution 10 jours</h3>
    <canvas id="chart-10j"></canvas>
</div>

<!-- METAUX -->
<div class="card">
    <h3>💎 Métaux</h3>
    <div id="metaux-total-bottom"></div>
</div>

<!-- ETF -->
<div class="card">
    <h3>📊 ETF</h3>
    <div id="etf-total-bottom"></div>
</div>

</div>

<script>

// ===== UTILS =====
let isLoading = false;

function cleanNumber(v){
    if(!v) return 0;
    return Number(
        v.replace(/\s/g,'')
         .replace(/€/g,'')
         .replace(',', '.')
    ) || 0;
}

function formatEuro(v){
    return v.toLocaleString('fr-BE') + " €";
}

function applyPerfClass(el, value){
    el.classList.remove("positive","negative");
    el.classList.add(value >= 0 ? "positive" : "negative");
}

// ===== PARSE CSV (ROBUSTE) =====
function parseCSV(text){

    const lines = text.split("\n");

    const data = {};
    const graph = [];

    for (let line of lines){

        if (!line.trim()) continue;

        const cols = line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
        if (!cols || cols.length < 2) continue;

        const key = cols[0].replace(/"/g,'').trim();
        const value = cols[1].replace(/"/g,'').trim();

        // ===== GRAPH (dates)
        if(/\d{2}\/\d{2}\/\d{4}/.test(key)){
            const val = cleanNumber(value);
            if(val > 0){
                graph.push({date:key,value:val});
            }
            continue;
        }

        // ===== IGNORE TITRES
        if(
            key.includes("GLOBAL") ||
            key.includes("METAUX") ||
            key.includes("ETF")
        ) continue;

        data[key] = value;
    }

    return {data, graph};
}

// ===== MAIN =====
async function loadData(){

if(isLoading) return;
isLoading = true;

try{

const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQQqy9DRNPqKY59Ka56rNkWGwYfd7XqKiGh6YJxudczufOx7ZOW6SzlTObz4DLG4t6AK9qmBfn6Tl78/pub?gid=1154137383&single=true&output=csv&_=" + Date.now(), {
    cache:"no-store"
});

const raw = await res.text();
const {data, graph} = parseCSV(raw);

// ===== KPI
const orS = cleanNumber(data["or_suisse_valeur"]);
const orB = cleanNumber(data["or_belgique_valeur"]);
const argent = cleanNumber(data["argent_valeur"]);

const etfMonde = cleanNumber(data["etf_monde_valeur"]);
const etfSeniors = cleanNumber(data["etf_seniors_valeur"]);

const or = orS + orB;
const totalETF = etfMonde + etfSeniors;
const total = or + argent + totalETF;
const ratio = cleanNumber(data["ratio"]);

document.getElementById("or").innerText = formatEuro(or);
document.getElementById("argent").innerText = formatEuro(argent);
document.getElementById("total").innerText = formatEuro(total);
document.getElementById("ratio").innerText = ratio.toFixed(2).replace('.',',');

// ===== BLOCS BAS
document.getElementById("metaux-total-bottom").innerText = formatEuro(or + argent);
document.getElementById("etf-total-bottom").innerText = formatEuro(totalETF);

// ===== GRAPH TRI
graph.sort((a,b)=>{
    const [d1,m1,y1]=a.date.split("/");
    const [d2,m2,y2]=b.date.split("/");
    return new Date(y1,m1-1,d1) - new Date(y2,m2-1,d2);
});

const labels = graph.map(x=>x.date);
const values = graph.map(x=>x.value);

// ===== VARIATION (CORRECTE)
let variation = 0;

if(values.length >= 2){
    const last = values[values.length - 1];
    const prev = values[values.length - 2];
    variation = last - prev;
}

const varEl = document.getElementById("variation");
varEl.innerText = (variation>=0?"+":"") + formatEuro(variation);
applyPerfClass(varEl, variation);

// ===== CHART
if(window.chart10j) window.chart10j.destroy();

window.chart10j = new Chart(document.getElementById("chart-10j"), {
    type:"line",
    data:{
        labels: labels.slice(-10),
        datasets:[{
            data: values.slice(-10),
            borderColor:"#facc15",
            borderWidth:3,
            fill:true,
            tension:0.4,
            pointRadius:4
        }]
    },
    options:{
        plugins:{legend:{display:false}},
        scales:{
            x:{ticks:{color:"#888"}},
            y:{ticks:{color:"#888"}}
        }
    }
});

}catch(e){
    console.error(e);
}

isLoading = false;
}

// ===== INIT
loadData();
setInterval(loadData,300000);

// ===== BTN
document.getElementById("refresh-btn").onclick = loadData;

</script>

</body>
</html>
