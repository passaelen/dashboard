<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portefeuille</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 15px;
}
.gold { color: #facc15; }
</style>

</head>

<body>

<div class="card">
    <h2>💼 Portefeuille</h2>
</div>

<div class="card">
    <h3>Total</h3>
    <h2 id="total" class="gold">...</h2>
</div>

<div class="card">
    <h3>OR</h3>
    <div id="or"></div>
</div>

<div class="card">
    <h3>ARGENT</h3>
    <div id="argent"></div>
</div>

<div class="card">
    <h3 id="ratio-label">RATIO</h3>
    <h2 id="ratio"></h2>
</div>

<div class="card">
    <div id="alert-text">...</div>
</div>

<script>

function csvToObject(text) {
    const rows = text.trim().split("\n");
    const data = {};

    for (let row of rows) {
        const cols = row.split(/[,;]+/);
        const key = cols[0]?.trim();
        const value = cols[1]?.trim();
        if (key) data[key] = value;
    }

    return data;
}

function cleanNumber(value) {
    if (!value) return 0;

    return Number(
        value
            .replace(/[^0-9,-]/g, '')
            .replace(',', '.')
    ) || 0;
}

async function loadData() {
    try {

        const res = await fetch("https://docs.google.com/spreadsheets/d/1-99frehfDPqn9YNLXivivS_axMXi82AGFNO6uIq9Nbw/export?format=csv&gid=1154137383");

        const data = csvToObject(await res.text());

        console.log(data);

        const orSuisse = cleanNumber(data["or_suisse"]);
        const orBelgique = cleanNumber(data["or_belgique"]);
        const argent = cleanNumber(data["argent"]);
        const ratio = cleanNumber(data["ratio"]);

        // affichage
        document.getElementById("or").innerText =
            (orSuisse + orBelgique).toLocaleString('fr-BE') + " €";

        document.getElementById("argent").innerText =
            argent.toLocaleString('fr-BE') + " €";

        document.getElementById("ratio").innerText =
            ratio.toFixed(2).replace('.', ',');

        const total = orSuisse + orBelgique + argent;

        document.getElementById("total").innerText =
            total.toLocaleString('fr-BE') + " €";

        // label
        let label = "";
        if (ratio >= 70) label = "❄️ Nord";
        else if (ratio >= 50) label = "⚖️ Pivot";
        else if (ratio >= 40) label = "🔥 Chaud";
        else label = "🚨 Extrême";

        document.getElementById("ratio-label").innerText =
            "RATIO - " + label;

        document.getElementById("alert-text").innerText = label;

    } catch (e) {
        console.error(e);
    }
}

loadData();

</script>

</body>
</html>
