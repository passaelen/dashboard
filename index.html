<!DOCTYPE html>
<html lang="fr">

<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portefeuille</title>

    <link rel="stylesheet" href="style.css?v=51">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
    <div class="header-left">
        <h2>💼 Portefeuille</h2>
        <small>Or · Argent · ETF</small>
    </div>

    <div class="header-actions">
        <div id="refresh-btn" class="refresh">⟳</div>
        <div id="variation" class="badge-perf"></div>
    </div>
</div>

<!-- TOTAL -->
<div class="card highlight">
    <small>Total global</small>
    <h2 id="total" class="gold"></h2>
</div>

<!-- KPI -->
<div class="kpi-grid">
    <div class="kpi"><small>OR</small><h3 id="or"></h3></div>
    <div class="kpi"><small>ARGENT</small><h3 id="argent"></h3></div>
    <div class="kpi"><small>RATIO</small><h3 id="ratio"></h3></div>
</div>

<!-- ALERT -->
<div class="card alert-box" id="alert-box">
    <span id="alert-text"></span>
</div>

<!-- GRAPH -->
<div class="card">
<h3>Évolution 10 jours</h3>
<canvas id="chart-10j"></canvas>
</div>

</div>

<script>

// ===== GLOBAL LOCK =====
let isLoading = false;
let lastGoodData = null;

// ===== UTILS =====
function cleanNumber(v){
    if(!v || v.trim() === "") return 0;

    return Number(
        v.replace(/\s/g, '')
         .replace(/€/g, '')
         .replace(',', '.')
    ) || 0;
}

function formatEuro(v){
    return v.toLocaleString('fr-BE') + " €";
}

function formatPercent(v){
    return v.toFixed(2).replace('.',',') + "%";
}

// ===== DOM =====
function setText(id, value){
    const el = document.getElementById(id);
    if(el) el.innerText = value;
}

function applyPerfClass(el, value){
    if(!el) return;
    el.classList.remove("positive", "negative");
    el.classList.add(value >= 0 ? "positive" : "negative");
}

// ===== PARSE CSV (STABLE) =====
function parseCSV(text){

    const lines = text.split("\n");
    const temp = {};
    const data = {};

    for (let line of lines){

        if (!line.trim()) continue;

        const cols = line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
        if (!cols || cols.length < 2) continue;

        const key = cols[0].replace(/"/g, "").trim();
        const value = cols[1].replace(/"/g, "").trim();

        if(/\d{2}\/\d{2}\/\d{4}/.test(key)) continue;

        if (!temp[key]) temp[key] = [];
        temp[key].push(value);
    }

    for (let key in temp){
        data[key] = temp[key][temp[key].length - 1];
    }

    return data;
}

// ===== MAIN =====
async function loadData(){

if(isLoading) return;
isLoading = true;

try {

const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQQqy9DRNPqKY59Ka56rNkWGwYfd7XqKiGh6YJxudczufOx7ZOW6SzlTObz4DLG4t6AK9qmBfn6Tl78/pub?gid=1154137383&single=true&output=csv&_=" + Date.now(), {
    cache: "no-store"
});

const rawText = await res.text();

// ===== PARSE + LOCK =====
const newData = parseCSV(rawText);

if (
    cleanNumber(newData["or_suisse_valeur"]) > 0 &&
    cleanNumber(newData["argent_valeur"]) > 0
){
    lastGoodData = newData;
}

const data = lastGoodData || newData;

// ===== KPI =====
const orS = cleanNumber(data["or_suisse_valeur"]);
const orB = cleanNumber(data["or_belgique_valeur"]);
const ag = cleanNumber(data["argent_valeur"]);
const ratio = cleanNumber(data["ratio"]);

const total = orS + orB + ag;

setText("or", formatEuro(orS + orB));
setText("argent", formatEuro(ag));
setText("ratio", ratio.toFixed(2).replace('.',','));
setText("total", formatEuro(total));

// ===== GRAPH =====
const rows = rawText.split("\n");
let dataPoints = [];

for(let row of rows){

    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
    if(!cols || cols.length < 2) continue;

    const key = cols[0].replace(/"/g, '').trim();
    const val = cleanNumber(cols[1]);

    if(/\d{2}\/\d{2}\/\d{4}/.test(key) && val > 0){
        dataPoints.push({date: key, value: val});
    }
}

dataPoints.sort((a, b) => {
    const [d1,m1,y1]=a.date.split("/");
    const [d2,m2,y2]=b.date.split("/");
    return new Date(y1,m1-1,d1)-new Date(y2,m2-1,d2);
});

const labels = dataPoints.map(p=>p.date).slice(-10);
const values = dataPoints.map(p=>p.value).slice(-10);

// ===== VARIATION =====
let variation = 0;
if(values.length){
    variation = total - values[values.length - 1];
}

const varEl = document.getElementById("variation");
if(varEl){
    varEl.innerText = (variation>=0?"+":"") + formatEuro(variation);
    applyPerfClass(varEl, variation);
}

// ===== CHART =====
if(window.chart10j) window.chart10j.destroy();

window.chart10j = new Chart(document.getElementById("chart-10j"), {
    type: 'line',
    data: {
        labels,
        datasets: [{
            data: values,
            borderColor: "#facc15",
            borderWidth: 3,
            fill: true,
            tension: 0.4,
            pointRadius: 0
        }]
    },
    options: {
        plugins: { legend: { display: false } }
    }
});

} catch(e){
    console.error(e);
}

isLoading = false;
}

// ===== INIT =====
loadData();
setInterval(loadData, 300000);

// ===== REFRESH BTN =====
document.getElementById("refresh-btn").addEventListener("click", () => {
    if(!isLoading) loadData();
});

</script>
</body>
</html>
