<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portefeuille</title>

<link rel="stylesheet" href="style.css?v=27">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
    <div>
        <h2>💼 Portefeuille</h2>
        <small>Or · Argent · ETF</small>
    </div>
    <div class="badge" id="variation"></div>
</div>

<!-- TOTAL -->
<div class="card highlight">
    <small>Total global</small>
    <h2 id="total" class="gold"></h2>
</div>

<!-- KPI -->
<div class="kpi-grid">
    <div class="kpi"><small>OR</small><h3 id="or"></h3></div>
    <div class="kpi"><small>ARGENT</small><h3 id="argent"></h3></div>
    <div class="kpi"><small>RATIO</small><h3 id="ratio"></h3></div>
</div>

<!-- ALERT -->
<div class="card alert-box">
    <span id="alert-text"></span>
</div>

<!-- REPARTITION -->
<div class="card">
<h3>Répartitions</h3>

<div class="repartition-grid">

<div class="bloc">
<h4>Métaux</h4>
<div class="donut" id="donut-metaux"></div>
<div class="legend">
<div>Or Suisse <span id="p-or-suisse"></span></div>
<div>Or Belgique <span id="p-or-belgique"></span></div>
<div>Argent <span id="p-argent"></span></div>
</div>
</div>

<div class="bloc">
<h4>ETF</h4>
<div class="donut etf"></div>
<div class="legend">
<div>Monde <span id="p-monde"></span></div>
<div>Séniors <span id="p-seniors"></span></div>
</div>
</div>

</div>
</div>

<!-- GRAPH -->
<div class="card">
<h3>Évolution 10 jours</h3>
<canvas id="chart-10j"></canvas>
</div>

<!-- METAUX -->
<div class="card">
<h3>Métaux Précieux</h3>

<div id="metaux-total-value"></div>
<div id="metaux-total-perf"></div>

<table>
<tr><th>Type</th><th>Stockage</th><th>Qté</th><th>€/g</th><th>Perf</th></tr>

<tr>
<td>Or</td><td>Suisse</td>
<td id="q-or-suisse"></td>
<td id="p-or-suisse-g"></td>
<td id="perf-or-suisse"></td>
</tr>

<tr>
<td>Or</td><td>Belgique</td>
<td id="q-or-belgique"></td>
<td id="p-or-belgique-g"></td>
<td id="perf-or-belgique"></td>
</tr>

<tr>
<td>Argent</td>
<td>Suisse</td>
<td id="q-argent"></td>
<td id="p-argent-g"></td>
<td id="perf-argent"></td>
</tr>

</table>
</div>

<!-- ETF -->
<div class="card">
<h3>ETF</h3>
<div id="etf-total-value"></div>

<table>
<tr><th>Nom</th><th>Parts</th><th>Spot</th><th>Perf</th></tr>

<tr>
<td>Monde</td>
<td id="etf-monde-parts"></td>
<td id="etf-monde-prix"></td>
<td id="etf-monde-perf"></td>
</tr>

<tr>
<td>Séniors</td>
<td id="etf-seniors-parts"></td>
<td id="etf-seniors-prix"></td>
<td id="etf-seniors-perf"></td>
</tr>

<tr>
<td>Juniors</td>
<td id="etf-juniors-parts"></td>
<td id="etf-juniors-prix"></td>
<td id="etf-juniors-perf"></td>
</tr>

</table>
</div>

</div>


<script>

// ===== UTILS =====
function cleanNumber(v){
    if(!v) return 0;

    return Number(
        v.replace(/"/g,'')
         .replace(/[^0-9,-]/g,'')
         .replace(',','.')
    ) || 0;
}

function formatPercent(v){
    return v.toFixed(2).replace('.',',')+"%";
}

function formatPerfDual(euro, percent){
    const color = euro >= 0 ? "#22c55e" : "#ef4444";
    return `
        <div style="color:${color}">${euro>=0?"+":""}${euro.toLocaleString('fr-BE')} €</div>
        <div style="color:${color};font-size:12px">${percent>=0?"+":""}${percent.toFixed(2).replace('.',',')} %</div>
    `;
}

// ===== LOAD =====
async function loadData(){

const res = await fetch("https://docs.google.com/spreadsheets/d/1-99frehfDPqn9YNLXivivS_axMXi82AGFNO6uIq9Nbw/export?format=csv&gid=1154137383");
const text = await res.text();
const rows = text.split("\n");
const data = {};
rows.forEach(r=>{
    const c=r.split(/[,;]+/);
    data[c[0]?.trim()] = c[1]?.trim();
});

// ===== KPI =====
const orS = cleanNumber(data["or_suisse_valeur"]);
const orB = cleanNumber(data["or_belgique_valeur"]);
const ag = cleanNumber(data["argent_valeur"]);

document.getElementById("or").innerText = (orS+orB).toLocaleString('fr-BE')+" €";
document.getElementById("argent").innerText = ag.toLocaleString('fr-BE')+" €";
document.getElementById("total").innerText = cleanNumber(data["total_global"]).toLocaleString('fr-BE')+" €";

const ratio = cleanNumber(data["ratio"]);
document.getElementById("ratio").innerText = ratio.toFixed(2).replace('.',',');

// ===== ALERT =====
let msg="";
if(ratio>=70) msg="❄️ Zone froide";
else if(ratio>=55) msg="🧊 Nord";
else if(ratio>=50) msg="⚖️ Pivot";
else if(ratio>=45) msg="🌤️ Arbitrage";
else if(ratio>=40) msg="🔥 Chaud";
else msg="🚨 Extrême";

document.getElementById("alert-text").innerText = msg;

// ===== VAR =====
const v = cleanNumber(data["variation"]);
const el = document.getElementById("variation");
el.innerText = (v>=0?"+":"")+v.toLocaleString('fr-BE')+" €";
el.style.color = v>=0?"#22c55e":"#ef4444";

// ===== METAUX DETAIL =====
document.getElementById("q-or-suisse").innerText =
 cleanNumber(data["or_suisse_qte"]).toLocaleString('fr-BE')+" g";

document.getElementById("p-or-suisse-g").innerText =
 cleanNumber(data["or_suisse_prix_g"]).toFixed(2).replace('.',',')+" €";

document.getElementById("perf-or-suisse").innerHTML = formatPerfDual(
    cleanNumber(data["or_suisse_perf"]),
    cleanNumber(data["or_suisse_percent"])
);

document.getElementById("q-or-belgique").innerText =
 cleanNumber(data["or_belgique_qte"]).toLocaleString('fr-BE')+" g";

document.getElementById("p-or-belgique-g").innerText =
 cleanNumber(data["or_belgique_prix_g"]).toFixed(2).replace('.',',')+" €";

document.getElementById("perf-or-belgique").innerHTML = formatPerfDual(
    cleanNumber(data["or_belgique_perf"]),
    cleanNumber(data["or_belgique_percent"])
);

document.getElementById("q-argent").innerText =
 cleanNumber(data["argent_qte"]).toLocaleString('fr-BE')+" g";

document.getElementById("p-argent-g").innerText =
 cleanNumber(data["argent_prix_g"]).toFixed(2).replace('.',',')+" €";

document.getElementById("perf-argent").innerHTML = formatPerfDual(
    cleanNumber(data["argent_perf"]),
    cleanNumber(data["argent_percent"])
);

// ===== TOTAL METAUX =====
document.getElementById("metaux-total-value").innerText =
    cleanNumber(data["metaux_total_valeur"]).toLocaleString('fr-BE')+" €";

document.getElementById("metaux-total-perf").innerText =
    formatPercent(cleanNumber(data["metaux_total_percent"]));

// ===== DONUT METAUX =====
const totalMetaux = orS + orB + ag;

const pOrS = (orS/totalMetaux)*100;
const pOrB = (orB/totalMetaux)*100;
const pAg = (ag/totalMetaux)*100;

document.getElementById("p-or-suisse").innerText = formatPercent(pOrS);
document.getElementById("p-or-belgique").innerText = formatPercent(pOrB);
document.getElementById("p-argent").innerText = formatPercent(pAg);


const donutMetaux = document.getElementById("donut-metaux");

if (donutMetaux) {
    donutMetaux.style.background = `
    conic-gradient(
        #facc15 0% ${pOrS}%,
        #f59e0b ${pOrS}% ${pOrS+pOrB}%,
        #9ca3af ${pOrS+pOrB}% 100%
    )`;
}





// ===== ETF =====
const etfMonde = cleanNumber(data["etf_monde_valeur"]);
const etfSeniors = cleanNumber(data["etf_seniors_valeur"]);
const totalETF = etfMonde + etfSeniors;

document.getElementById("etf-total-value").innerText =
 totalETF.toLocaleString('fr-BE')+" €";

document.getElementById("etf-monde-parts").innerText = data["etf_monde_parts"];
document.getElementById("etf-monde-prix").innerText = cleanNumber(data["etf_monde_prix"]).toLocaleString('fr-BE')+" €";
document.getElementById("etf-monde-perf").innerHTML = formatPerfDual(
    cleanNumber(data["etf_monde_perf"]),
    cleanNumber(data["etf_monde_percent"])
);

document.getElementById("etf-seniors-parts").innerText = data["etf_seniors_parts"];
document.getElementById("etf-seniors-prix").innerText = cleanNumber(data["etf_seniors_prix"]).toLocaleString('fr-BE')+" €";
document.getElementById("etf-seniors-perf").innerHTML = formatPerfDual(
    cleanNumber(data["etf_seniors_perf"]),
    cleanNumber(data["etf_seniors_percent"])
);

// ===== DONUT ETF =====
const pMonde = (etfMonde/totalETF)*100;
const pSeniors = (etfSeniors/totalETF)*100;

document.getElementById("p-monde").innerText = formatPercent(pMonde);
document.getElementById("p-seniors").innerText = formatPercent(pSeniors);


const donutETF = document.querySelector(".donut.etf");

if (donutETF) {
    donutETF.style.background = `
    conic-gradient(
        #38bdf8 0% ${pMonde}%,
        #22c55e ${pMonde}% 100%
    )`;
}





// ===== GRAPH =====
const resChart = await fetch("https://docs.google.com/spreadsheets/d/1-99frehfDPqn9YNLXivivS_axMXi82AGFNO6uIq9Nbw/export?format=csv&gid=1311770820");
const rowsChart = (await resChart.text()).split("\n");

const labels=[], values=[];

for(let i=1;i<rowsChart.length;i++){
    const c = rowsChart[i].split(",");
    const val = cleanNumber(c[7]);
    if(val>0){
        labels.push(c[0]);
        values.push(val);
    }
}

const ctx=document.getElementById("chart-10j");

new Chart(ctx,{
type:'line',
data:{
labels:labels.slice(-10),
datasets:[{
data:values.slice(-10),
borderColor:"#facc15",
backgroundColor:"rgba(250,204,21,0.1)",
fill:true,
tension:0.4,
pointRadius:0
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
x:{ticks:{color:"#9ca3af"}},
y:{ticks:{color:"#9ca3af"}}

catch(e) {
        console.error("Erreur JS :", e);



// ===== GRAPH =====
const resChart = await fetch("https://docs.google.com/spreadsheets/d/1-99frehfDPqn9YNLXivivS_axMXi82AGFNO6uIq9Nbw/export?format=csv&gid=1311770820");

const rowsChart = (await resChart.text()).split("\n");

const labels = [];
const values = [];

for(let i=1;i<rowsChart.length;i++){
    const cols = rowsChart[i].split(/[,;]+/);
    const val = cleanNumber(cols[7]);

    if(val>0){
        labels.push(cols[0]);
        values.push(val);
    }
}

const ctx = document.getElementById("chart-10j");

if(ctx){

    if(window.chart10j){
        window.chart10j.destroy();
    }

    window.chart10j = new Chart(ctx,{
        type:'line',
        data:{
            labels: labels.slice(-10),
            datasets:[{
                data: values.slice(-10),
                borderColor:"#facc15",
                backgroundColor:"rgba(250,204,21,0.1)",
                fill:true,
                tension:0.4,
                pointRadius:0
            }]
        },
        options:{
            plugins:{legend:{display:false}},
            scales:{
                x:{ticks:{color:"#9ca3af"}},
                y:{ticks:{color:"#9ca3af"}}
            }
        }
    });
}


}
}
});

}

loadData();

</script>

</body>
</html>
