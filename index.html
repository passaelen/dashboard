<!DOCTYPE html>
<html lang="fr">

<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
        
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portefeuille</title>
    
    <link rel="stylesheet" href="style.css?v=33">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
    <div class="header-left">
        <h2>💼 Portefeuille</h2>
        <small>Or · Argent · ETF</small>
    </div>

    <div class="header-actions">
        <div class="refresh">⟳</div>
        <div id="variation" class="badge-perf"></div>
    </div>
</div>

    
<!-- TOTAL -->
<div class="card highlight">
    <small>Total global</small>
    <h2 id="total" class="gold"></h2>
</div>

<!-- KPI -->
<div class="kpi-grid">
    <div class="kpi"><small>OR</small><h3 id="or"></h3></div>
    <div class="kpi"><small>ARGENT</small><h3 id="argent"></h3></div>
    <div class="kpi"><small>RATIO</small><h3 id="ratio"></h3></div>
</div>

<!-- ALERT -->
<div class="card alert-box">
    <span id="alert-text"></span>
</div>

<!-- REPARTITION -->
<div class="card">
<h3>Répartitions</h3>

<div class="repartition-grid">

<div class="bloc">
<h4>Métaux</h4>
<div class="donut" id="donut-metaux"></div>
<div class="legend">
<div>Or Suisse <span id="p-or-suisse"></span></div>
<div>Or Belgique <span id="p-or-belgique"></span></div>
<div>Argent <span id="p-argent"></span></div>
</div>
</div>

<div class="bloc">
<h4>ETF</h4>
<div class="donut etf"></div>
<div class="legend">
<div>Monde <span id="p-monde"></span></div>
<div>Séniors <span id="p-seniors"></span></div>
</div>
</div>

</div>
</div>

<!-- GRAPH -->
<div class="card">
<h3>Évolution 10 jours</h3>
<canvas id="chart-10j"></canvas>
</div>

<!-- METAUX -->
<div class="card">
<h3>Métaux Précieux</h3>

<div id="metaux-total-value"></div>
<div id="metaux-total-perf"></div>

<table>
<tr><th>Type</th><th>Stockage</th><th>Qté</th><th>€/g</th><th>Perf</th></tr>

<tr>
<td>Or</td><td>Suisse</td>
<td id="q-or-suisse"></td>
<td id="p-or-suisse-g"></td>
<td id="perf-or-suisse"></td>
</tr>

<tr>
<td>Or</td><td>Belgique</td>
<td id="q-or-belgique"></td>
<td id="p-or-belgique-g"></td>
<td id="perf-or-belgique"></td>
</tr>

<tr>
<td>Argent</td><td>Suisse</td>
<td id="q-argent"></td>
<td id="p-argent-g"></td>
<td id="perf-argent"></td>
</tr>

</table>
</div>

<!-- ETF -->
<div class="card">
<h3>ETF</h3>
<div id="etf-total-value"></div>

<table>
<tr><th>Nom</th><th>Parts</th><th>Spot</th><th>Perf</th></tr>

<tr>
<td>Monde</td>
<td id="etf-monde-parts"></td>
<td id="etf-monde-prix"></td>
<td id="etf-monde-perf"></td>
</tr>

<tr>
<td>Séniors</td>
<td id="etf-seniors-parts"></td>
<td id="etf-seniors-prix"></td>
<td id="etf-seniors-perf"></td>
</tr>

<tr>
<td>Juniors</td>
<td id="etf-juniors-parts"></td>
<td id="etf-juniors-prix"></td>
<td id="etf-juniors-perf"></td>
</tr>

</table>
</div>

</div>

<script>

// ===== UTILS =====
function cleanNumber(v){
    if(!v) return 0;
    return Number(
        v.replace(/"/g,'')
         .replace(/[^0-9,-]/g,'')
         .replace(',','.')
    ) || 0;
}

function formatEuro(v){
    return v.toLocaleString('fr-BE') + " €";
}

function formatPercent(v){
    return v.toFixed(2).replace('.',',') + "%";
}

// ===== DOM HELPERS =====
function setText(id, value){
    document.getElementById(id).innerText = value;
}

function setHTML(id, value){
    document.getElementById(id).innerHTML = value;
}

function applyPerfClass(el, value){
    el.classList.remove("positive", "negative");
    el.classList.add(value >= 0 ? "positive" : "negative");
}

// ===== PERF DISPLAY =====
function formatPerfDual(euro, percent){
    const cls = euro >= 0 ? "positive" : "negative";

    return `
        <div class="${cls}">
            ${euro>=0?"+":""}${formatEuro(euro)}
        </div>
        <div class="${cls} text-small">
            ${percent>=0?"+":""}${formatPercent(percent)}
        </div>
    `;
}

// ===== ALERT LOGIC =====
function getAlertMessage(ratio){
    if(ratio>=70) return "❄️ Zone froide";
    if(ratio>=55) return "🧊 Nord";
    if(ratio>=50) return "⚖️ Pivot";
    if(ratio>=45) return "🌤️ Arbitrage";
    if(ratio>=40) return "🔥 Chaud";
    return "🚨 Extrême";
}

// ===== DATA PARSING =====
function parseCSV(text){
    const data = {};
    text.split("\n").forEach(r=>{
        const i = r.indexOf(",");
        if(i === -1) return;

        const key = r.slice(0, i).trim();
        const value = r.slice(i + 1).trim();

        data[key] = value;
    });
    return data;
}

// ===== MAIN =====
async function loadData(){

try {

const res = await fetch("https://docs.google.com/spreadsheets/d/1-99frehfDPqn9YNLXivivS_axMXi82AGFNO6uIq9Nbw/export?format=csv&gid=1154137383");
const data = parseCSV(await res.text());

// ===== KPI =====
const orS = cleanNumber(data["or_suisse_valeur"]);
const orB = cleanNumber(data["or_belgique_valeur"]);
const ag = cleanNumber(data["argent_valeur"]);
const total = cleanNumber(data["total_global"]);
const ratio = cleanNumber(data["ratio"]);

setText("or", formatEuro(orS + orB));
setText("argent", formatEuro(ag));
setText("total", formatEuro(total));
setText("ratio", ratio.toFixed(2).replace('.',','));

// ===== ALERT =====
setText("alert-text", getAlertMessage(ratio));

// ===== VARIATION =====
const variation = cleanNumber(data["variation"]);
const varEl = document.getElementById("variation");

varEl.innerText = (variation>=0?"+":"") + formatEuro(variation);
applyPerfClass(varEl, variation);

// ===== METAUX =====
setText("q-or-suisse", cleanNumber(data["or_suisse_qte"]).toLocaleString('fr-BE') + " g");
setText("p-or-suisse-g", formatEuro(cleanNumber(data["or_suisse_prix_g"])));
setHTML("perf-or-suisse", formatPerfDual(
    cleanNumber(data["or_suisse_perf"]),
    cleanNumber(data["or_suisse_percent"])
));

setText("q-or-belgique", cleanNumber(data["or_belgique_qte"]).toLocaleString('fr-BE') + " g");
setText("p-or-belgique-g", formatEuro(cleanNumber(data["or_belgique_prix_g"])));
setHTML("perf-or-belgique", formatPerfDual(
    cleanNumber(data["or_belgique_perf"]),
    cleanNumber(data["or_belgique_percent"])
));

setText("q-argent", cleanNumber(data["argent_qte"]).toLocaleString('fr-BE') + " g");
setText("p-argent-g", formatEuro(cleanNumber(data["argent_prix_g"])));
setHTML("perf-argent", formatPerfDual(
    cleanNumber(data["argent_perf"]),
    cleanNumber(data["argent_percent"])
));

// ===== TOTAL METAUX =====
setText("metaux-total-value", formatEuro(cleanNumber(data["metaux_total_valeur"])));
setText("metaux-total-perf", formatPercent(cleanNumber(data["metaux_total_percent"])));

// ===== DONUT METAUX =====
const totalMetaux = orS + orB + ag || 1;

const pOrS = (orS/totalMetaux)*100;
const pOrB = (orB/totalMetaux)*100;
const pAg = (ag/totalMetaux)*100;

setText("p-or-suisse", formatPercent(pOrS));
setText("p-or-belgique", formatPercent(pOrB));
setText("p-argent", formatPercent(pAg));

document.getElementById("donut-metaux").style.background =
`conic-gradient(#facc15 0% ${pOrS}%, #f59e0b ${pOrS}% ${pOrS+pOrB}%, #9ca3af ${pOrS+pOrB}% 100%)`;

// ===== ETF =====
const etfMonde = cleanNumber(data["etf_monde_valeur"]);
const etfSeniors = cleanNumber(data["etf_seniors_valeur"]);
const totalETF = etfMonde + etfSeniors || 1;

setText("etf-total-value", formatEuro(totalETF));

setText("etf-monde-parts", data["etf_monde_parts"]);
setText("etf-monde-prix", formatEuro(cleanNumber(data["etf_monde_prix"])));
setHTML("etf-monde-perf", formatPerfDual(
    cleanNumber(data["etf_monde_perf"]),
    cleanNumber(data["etf_monde_percent"])
));

setText("etf-seniors-parts", data["etf_seniors_parts"]);
setText("etf-seniors-prix", formatEuro(cleanNumber(data["etf_seniors_prix"])));
setHTML("etf-seniors-perf", formatPerfDual(
    cleanNumber(data["etf_seniors_perf"]),
    cleanNumber(data["etf_seniors_percent"])
));

// ===== DONUT ETF =====
const pMonde = (etfMonde/totalETF)*100;

setText("p-monde", formatPercent(pMonde));
setText("p-seniors", formatPercent(100 - pMonde));

document.querySelector(".donut.etf").style.background =
`conic-gradient(#38bdf8 0% ${pMonde}%, #22c55e ${pMonde}% 100%)`;

// ===== GRAPH =====
const resChart = await fetch("https://docs.google.com/spreadsheets/d/1-99frehfDPqn9YNLXivivS_axMXi82AGFNO6uIq9Nbw/export?format=csv&gid=1311770820");
const rows = (await resChart.text()).split("\n");

const labels=[], values=[];

for(let i=1;i<rows.length;i++){
    const c = rows[i].split(/[,;]+/);
    const val = cleanNumber(c[7]);
    if(val>0){
        labels.push(c[0]);
        values.push(val);
    }
}

if(window.chart10j){ window.chart10j.destroy(); }

window.chart10j = new Chart(document.getElementById("chart-10j"),{
    type:'line',
    data:{
        labels: labels.slice(-10),
        datasets:[{
            data: values.slice(-10),
            borderColor:"#facc15",
            backgroundColor:"rgba(250,204,21,0.1)",
            fill:true,
            tension:0.4,
            pointRadius:0
        }]
    },
    options:{
        plugins:{legend:{display:false}},
        scales:{
            x:{ticks:{color:"#9ca3af"}},
            y:{ticks:{color:"#9ca3af"}}
        }
    }
});

} catch(e){
    console.error("Erreur JS :", e);
}

}

// ===== INIT =====
loadData();
setInterval(loadData, 300000); // refresh 5 min



if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js")
        .then(() => console.log("SW OK"))
        .catch(err => console.log("SW erreur", err));
}

    
</script>
</body>
</html>
